<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualiseur de Facture PDF</title>
    <style>
        /* CSS pour la mise en page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .header {
            width: 100%;
            background-color: #2c3e50;
            color: white;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            flex: 1;
            width: 90%;
            max-width: 1000px;
            margin: 20px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* Le conteneur du PDF occupe tout l'espace disponible */
        #pdf-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            padding: 10px;
            font-size: 0.8em;
            color: #7f8c8d;
        }
    </style>
</head>

        // 2. FONCTION POUR AFFICHER LE PDF
        function loadPDF(base64) {
            const iframe = document.getElementById('pdf-viewer');
            
            // On s'assure que le préfixe est présent, sinon on l'ajoute
            const formatBase64 = base64.startsWith('data:application/pdf;base64,') 
                                 ? base64 
                                 : 'data:application/pdf;base64,' + base64;
            
            iframe.src = formatBase64;
        }

        // Exécution de la fonction au chargement
        loadPDF(base64String);
